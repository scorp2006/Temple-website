# Render Blueprint — provisions the PostgreSQL database + the Express backend.
# In Render: New → Blueprint → connect this repo. It reads this file and creates
# both services. (The Next.js frontend deploys separately on Vercel.)
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: temple-db
    databaseName: temple
    plan: free # free Postgres (expires after 90 days on free tier — upgrade for prod)

services:
  - type: web
    name: temple-api
    runtime: node
    plan: free
    rootDir: backend
    # --include=dev ensures ts-node (used by the seed) is available during build
    buildCommand: npm install --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy && npm run seed
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: temple-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PAYMENTS_MODE
        value: mock # switch to "razorpay" + add keys when ready
      - key: RESERVATION_HOLD_MINUTES
        value: 10
      - key: QUEUE_MAX_CONCURRENT
        value: 50
      - key: QUEUE_MAX_WAIT_MS
        value: 30000
      # Set this to your deployed Vercel URL after the frontend is live:
      - key: CORS_ORIGINS
        value: http://localhost:3000
